<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DAT Validator</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main class="container">
    <h1>DAT Validator</h1>
    <p class="subtitle">Upload one DAT file and one assignment file, then generate an anomaly report.</p>

    <form id="upload-form" class="card">
      <label class="field">
        <span>DAT file (.xls)</span>
        <input type="file" name="dat_file" accept=".xls" required />
      </label>

      <label class="field">
        <span>Assignment file (.xlsx)</span>
        <input type="file" name="assignment_file" accept=".xlsx" required />
      </label>

      <button type="submit">Process files</button>
    </form>

    <section id="status" class="card hidden"></section>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
